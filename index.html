<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <title>Raven AI — Docs</title>
    <meta
      name="description"
      content="Documentation for Raven AI. Placeholder — coming soon."
    />
    <link rel="canonical" href="https://docs.ravenintelligence.ai/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --raven-black: #0a0e1a;
        --raven-navy: #0f1729;
        --raven-red: #e63946;
        --raven-blue: #2e6be6;
        --raven-blue-glow: #4a8fff;
        --raven-text: #919191;
        --raven-text-muted: #9ca3af;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background:
          radial-gradient(
              ellipse at top left,
              rgba(46, 107, 230, 0.12),
              transparent 60%
            ),
          radial-gradient(
              ellipse at bottom right,
              rgba(230, 57, 70, 0.15),
              transparent 60%
            ),
          var(--raven-black);
        color: var(--raven-text);
        font-family:
          Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 44rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .eyebrow {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--raven-blue);
        margin: 0;
      }
      h1 {
        font-family: Fraunces, Georgia, serif;
        font-weight: 700;
        font-size: clamp(2.25rem, 6vw, 4rem);
        line-height: 1.05;
        color: #fff;
        margin: 0;
        text-wrap: balance;
      }
      h1 em {
        font-style: italic;
        color: var(--raven-red);
      }
      p {
        font-size: 1.125rem;
        line-height: 1.6;
        margin: 0;
        color: var(--raven-text-muted);
      }
      a {
        color: #fff;
        text-decoration: none;
        border-bottom: 1px solid var(--raven-red);
        padding-bottom: 2px;
        transition: border-color 0.2s;
      }
      a:hover,
      a:focus-visible {
        border-bottom-color: var(--raven-blue-glow);
        outline: none;
      }
      footer {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: var(--raven-text-muted);
      }
      footer strong {
        color: #fff;
        font-weight: 600;
      }
      footer strong em {
        color: var(--raven-red);
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Raven AI · Docs</p>
      <h1>Documentation <em>coming soon.</em></h1>
      <p>
        We&rsquo;re preparing the Raven AI documentation site. In the meantime,
        visit
        <a href="https://ravenintelligence.ai/">ravenintelligence.ai</a>
        or request a briefing at
        <a href="https://ravenintelligence.ai/briefing"
          >ravenintelligence.ai/briefing</a
        >.
      </p>
      <footer>
        <strong>RAVEN <em>AI</em></strong> · Raven AI Intelligence LLC · 2026
      </footer>
    </main>
  </body>
</html>
